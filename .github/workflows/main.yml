name: CI-CD
on: 
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
    - name: Obtendo o código
      uses: actions/checkout@v6.0.2 # Atualizado para a versão major estável estável se necessário

    - name: Autenticação no Docker Hub
      uses: docker/login-action@v4.2.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build da Imagem Docker
      uses: docker/build-push-action@v7.2.0
      with:
        context: ./src
        file: ./src/Dockerfile
        push: true
        tags: |
          vgip88/aula-primeira-pipeline:v${{ github.run_number }}
          vgip88/aula-primeira-pipeline:latest 
  CD:
    runs-on: ubuntu-latest
    needs: [CI]
    steps: 
    - name: Obtendo o código
      uses: actions/checkout@v6.0.2
    - name: Configuração de contexto do Kubernetes
      uses: azure/k8s-set-context@v5
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.K8S_CONFIG }}
    - name: Execução do Manifesto
      uses: Azure/k8s-deploy@v6.0.0
      with:
        manifests: |
          ./k8s/deployment.yaml
        images: |
          vgip88/aula-primeira-pipeline:v${{ github.run_number }}
